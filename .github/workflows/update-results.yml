name: Update World Cup Results

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/World_Cup_favorites.yaml"
  schedule:
    - cron: "15 */3 * * *"

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch latest Wikipedia results
        run: python fetch_wikipedia_results.py

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/results.json src/latest-results.js
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "Update World Cup results"
            git push
          fi
